services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hausmeister
      POSTGRES_PASSWORD: hausmeister
      POSTGRES_DB: hausmeister
    ports:
      - "5432:5432"
    volumes:
      - hausmeister_pg:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hausmeister -d hausmeister"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hausmeister:hausmeister@db:5432/hausmeister
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PIONEER_API_KEY: ${PIONEER_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:4173}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      # gradbot reads LLM_* envs to talk to an OpenAI-compatible endpoint.
      # Gemini exposes one at https://generativelanguage.googleapis.com/v1beta/openai/
      # so we point gradbot at it and reuse GEMINI_API_KEY as LLM_API_KEY.
      LLM_BASE_URL: ${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      LLM_MODEL: ${LLM_MODEL:-gemini-flash-latest}
      LLM_API_KEY: ${LLM_API_KEY:-${GEMINI_API_KEY:-}}
      GRADIUM_API_KEY: ${GRADIUM_API_KEY:-}
      GRADIUM_VOICE_ID: ${GRADIUM_VOICE_ID:-}
      # Use raw PCM end-to-end on the WS — simpler than the Opus path
      # for first boot. Flip to 0 to fall back to OggOpus (smaller frames).
      USE_PCM: ${USE_PCM:-1}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    depends_on:
      - api
    environment:
      VITE_API_URL: http://api:8080
    ports:
      - "3000:80"

volumes:
  hausmeister_pg:
