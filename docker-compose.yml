services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hausmeister
      POSTGRES_PASSWORD: hausmeister
      POSTGRES_DB: hausmeister
    ports:
      - "5432:5432"
    volumes:
      - hausmeister_pg:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hausmeister -d hausmeister"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hausmeister:hausmeister@db:5432/hausmeister
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
    ports:
      - "8080:8080"

volumes:
  hausmeister_pg:
